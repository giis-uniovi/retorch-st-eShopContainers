sonar.host.url=https://sonarcloud.io

# Analysis is scoped to the SUT (./sut) via sonar.projectBaseDir, set as an
# absolute path in the workflow (the .NET scanner needs it absolute, and it is
# environment-specific). Paths below are relative to that base directory.
sonar.typescript.tsconfigPaths=src/Web/WebSPA/Client/tsconfig.json,src/Web/WebSPA/Client/src/tsconfig.app.json

sonar.exclusions=build/**,deploy/**,**/node_modules/**,**/bin/**,**/obj/**,**/*Migrations/**,**/wwwroot/lib/**,**/*.min.css,**/*.min.js,**/.angular/**,**/*.png,**/*.jpg,**/*.ico,**/*.zip,**/*.pfx,**/*.woff,**/*.woff2,**/*.ttf,**/*.eot,**/Dockerfile.develop,**/Identity.API/wwwroot/css/**
sonar.cpd.exclusions=**/FunctionalTests/**,**/ApiGateways/Web.Bff.Shopping/**,**/ApiGateways/Mobile.Bff.Shopping/**
