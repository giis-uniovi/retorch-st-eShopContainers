sonar.host.url=https://sonarcloud.io

# Analysis is scoped to the SUT (./sut) via sonar.projectBaseDir, set as an
# absolute path in the workflow (the .NET scanner needs it absolute, and it is
# environment-specific). Paths below are relative to that base directory.
sonar.typescript.tsconfigPaths=src/Web/WebSPA/Client/tsconfig.json,src/Web/WebSPA/Client/tsconfig.app.json

sonar.exclusions=**/node_modules/**,**/bin/**,**/obj/**,**/Migrations/**,**/wwwroot/**,**/.angular/**
