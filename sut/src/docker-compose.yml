services:
  seq:
    container_name: seq_${TJOB_NAME:-default}
    image: datalust/seq:2025.2
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=true
    networks:
      - jenkins_network

  sqldata:
    container_name: sqldata_${TJOB_NAME:-default}
    image: mcr.microsoft.com/mssql/server:2019-CU28-ubuntu-20.04
    environment:
      - SA_PASSWORD=Pass@word
      - ACCEPT_EULA=Y
    volumes:
      - eshop-sqldata:/var/opt/mssql
    networks:
      - jenkins_network
    healthcheck:
      test: "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U SA -P \"Pass@word\" -Q \"SELECT name FROM master.sys.databases\""
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s

  nosqldata:
    container_name: nosqldata_${TJOB_NAME:-default}
    image: mongo:8.2.5-noble
    volumes:
      - eshop-nosqldata:/data/db
    networks:
      - jenkins_network

  basketdata:
    container_name: basketdata_${TJOB_NAME:-default}
    image: redis:alpine
    volumes:
      - eshop-basketdata:/data
    networks:
      - jenkins_network

  rabbitmq:
    container_name: rabbitmq_${TJOB_NAME:-default}
    image: rabbitmq:3-management-alpine
    networks:
      - jenkins_network

  identity-api:
    container_name: identity_api_${TJOB_NAME:-default}
    image: ${REGISTRY:-eshop}/identity.api:${PLATFORM:-linux}-${TAG:-latest}
    build:
      context: .
      dockerfile: Services/Identity/Identity.API/Dockerfile
    depends_on:
      sqldata:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:80
      - SpaClient=http://webspa_${TJOB_NAME:-default}
      - XamarinCallback=http://identity_api_${TJOB_NAME:-default}/xamarincallback
      - ConnectionStrings__IdentityDb=Server=sqldata_${TJOB_NAME:-default},1433;Database=Microsoft.eShopOnContainers.Service.IdentityDb;User Id=sa;Password=Pass@word;Encrypt=False;TrustServerCertificate=true
      - MvcClient=http://webmvc_${TJOB_NAME:-default}
      - BasketApiClient=http://basket_api_${TJOB_NAME:-default}
      - OrderingApiClient=http://ordering_api_${TJOB_NAME:-default}
      - MobileShoppingAggClient=http://mobileshoppingagg_${TJOB_NAME:-default}
      - WebShoppingAggClient=http://webshoppingagg_${TJOB_NAME:-default}
      - WebhooksApiClient=http://webhooks_api_${TJOB_NAME:-default}
      - WebhooksWebClient=http://webhooks_client_${TJOB_NAME:-default}
      - UseCustomizationData=True
      - ApplicationInsights__InstrumentationKey=${INSTRUMENTATION_KEY}
      - OrchestratorType=${ORCHESTRATOR_TYPE}
    networks:
      - jenkins_network

  basket-api:
    container_name: basket_api_${TJOB_NAME:-default}
    image: ${REGISTRY:-eshop}/basket.api:${PLATFORM:-linux}-${TAG:-latest}
    build:
      context: .
      dockerfile: Services/Basket/Basket.API/Dockerfile
    depends_on:
      - basketdata
      - identity-api
      - rabbitmq
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Kestrel__Endpoints__HTTP__Url=http://0.0.0.0:80
      - Kestrel__Endpoints__GRPC__Url=http://0.0.0.0:81
      - Kestrel__Endpoints__GRPC__Protocols=Http2
      - ConnectionStrings__Redis=basketdata_${TJOB_NAME:-default}
      - ConnectionStrings__EventBus=rabbitmq_${TJOB_NAME:-default}
      - Identity__Url=http://identity_api_${TJOB_NAME:-default}
      - Identity__ExternalUrl=http://identity_api_${TJOB_NAME:-default}
      - EventBus__UserName=${ESHOP_SERVICE_BUS_USERNAME}
      - EventBus__Password=${ESHOP_SERVICE_BUS_PASSWORD}
      - ApplicationInsights__InstrumentationKey=${INSTRUMENTATION_KEY}
      - OrchestratorType=${ORCHESTRATOR_TYPE}
      - UseLoadTest=${USE_LOADTEST:-False}
      - PATH_BASE=/basket_api_${TJOB_NAME:-default}
    networks:
      - jenkins_network

  catalog-api:
    container_name: catalog_api_${TJOB_NAME:-default}
    image: ${REGISTRY:-eshop}/catalog.api:${PLATFORM:-linux}-${TAG:-latest}
    build:
      context: .
      dockerfile: Services/Catalog/Catalog.API/Dockerfile
    depends_on:
      sqldata:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Kestrel__Endpoints__HTTP__Url=http://0.0.0.0:80
      - Kestrel__Endpoints__GRPC__Url=http://0.0.0.0:81
      - Kestrel__Endpoints__GRPC__Protocols=Http2
      - ConnectionStrings__CatalogDb=Server=sqldata_${TJOB_NAME:-default},1433;Database=Microsoft.eShopOnContainers.Services.CatalogDb;User Id=sa;Password=Pass@word;Encrypt=False;TrustServerCertificate=true
      - ConnectionStrings__EventBus=rabbitmq_${TJOB_NAME:-default}
      - PicBaseUrl=${ESHOP_STORAGE_CATALOG_URL}
      - EventBus__UserName=${ESHOP_SERVICE_BUS_USERNAME}
      - EventBus__Password=${ESHOP_SERVICE_BUS_PASSWORD}
      - AzureStorageAccountName=${ESHOP_AZURE_STORAGE_CATALOG_NAME}
      - AzureStorageAccountKey=${ESHOP_AZURE_STORAGE_CATALOG_KEY}
      - UseCustomizationData=True
      - AzureStorageEnabled=False
      - ApplicationInsights__InstrumentationKey=${INSTRUMENTATION_KEY}
      - OrchestratorType=${ORCHESTRATOR_TYPE}
      - PATH_BASE=/catalog_api_${TJOB_NAME:-default}
    networks:
      - jenkins_network

  ordering-api:
    container_name: ordering_api_${TJOB_NAME:-default}
    image: ${REGISTRY:-eshop}/ordering.api:${PLATFORM:-linux}-${TAG:-latest}
    build:
      context: .
      dockerfile: Services/Ordering/Ordering.API/Dockerfile
    depends_on:
      sqldata:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    healthcheck:
      test: "curl -f http://localhost/hc || exit 1"
      interval: 30s
      timeout: 3s
      retries: 15
      start_period: 25s
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Kestrel__Endpoints__HTTP__Url=http://0.0.0.0:80
      - Kestrel__Endpoints__GRPC__Url=http://0.0.0.0:81
      - Kestrel__Endpoints__GRPC__Protocols=Http2
      - ConnectionStrings__OrderingDb=Server=sqldata_${TJOB_NAME:-default},1433;Database=Microsoft.eShopOnContainers.Services.OrderingDb;User Id=sa;Password=Pass@word;Encrypt=False;TrustServerCertificate=true
      - ConnectionStrings__EventBus=rabbitmq_${TJOB_NAME:-default}
      - Identity__Url=http://identity_api_${TJOB_NAME:-default}
      - Identity__ExternalUrl=http://identity_api_${TJOB_NAME:-default}
      - EventBus__UserName=${ESHOP_SERVICE_BUS_USERNAME}
      - EventBus__Password=${ESHOP_SERVICE_BUS_PASSWORD}
      - UseCustomizationData=True
      - AzureServiceBusEnabled=False
      - CheckUpdateTime=30000
      - ApplicationInsights__InstrumentationKey=${INSTRUMENTATION_KEY}
      - OrchestratorType=${ORCHESTRATOR_TYPE}
      - UseLoadTest=${USE_LOADTEST:-False}
      - PATH_BASE=/ordering_api_${TJOB_NAME:-default}
      - GRPC_PORT=81
      - PORT=80
    networks:
      - jenkins_network

  ordering-backgroundtasks:
    container_name: ordering_backgroundtasks_${TJOB_NAME:-default}
    image: ${REGISTRY:-eshop}/ordering.backgroundtasks:${PLATFORM:-linux}-${TAG:-latest}
    build:
      context: .
      dockerfile: Services/Ordering/Ordering.BackgroundTasks/Dockerfile
    depends_on:
      ordering-api:
        condition: service_healthy
      sqldata:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:80
      - ConnectionStrings__OrderingDb=Server=sqldata_${TJOB_NAME:-default},1433;Database=Microsoft.eShopOnContainers.Services.OrderingDb;User Id=sa;Password=Pass@word;Encrypt=False;TrustServerCertificate=true
      - ConnectionStrings__EventBus=rabbitmq_${TJOB_NAME:-default}
      - EventBus__UserName=${ESHOP_SERVICE_BUS_USERNAME}
      - EventBus__Password=${ESHOP_SERVICE_BUS_PASSWORD}
      - UseCustomizationData=True
      - AzureServiceBusEnabled=False
      - CheckUpdateTime=30000
      - GracePeriodTime=1
      - ApplicationInsights__InstrumentationKey=${INSTRUMENTATION_KEY}
      - OrchestratorType=${ORCHESTRATOR_TYPE}
      - UseLoadTest=${USE_LOADTEST:-False}
    networks:
      - jenkins_network

  payment-api:
    container_name: payment_api_${TJOB_NAME:-default}
    image: ${REGISTRY:-eshop}/payment.api:${PLATFORM:-linux}-${TAG:-latest}
    build:
      context: .
      dockerfile: Services/Payment/Payment.API/Dockerfile
    depends_on:
      - rabbitmq
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:80
      - ConnectionStrings__EventBus=rabbitmq_${TJOB_NAME:-default}
      - EventBus__UserName=${ESHOP_SERVICE_BUS_USERNAME}
      - EventBus__Password=${ESHOP_SERVICE_BUS_PASSWORD}
      - AzureServiceBusEnabled=False
      - ApplicationInsights__InstrumentationKey=${INSTRUMENTATION_KEY}
      - OrchestratorType=${ORCHESTRATOR_TYPE}
    networks:
      - jenkins_network

  webhooks-api:
    container_name: webhooks_api_${TJOB_NAME:-default}
    image: ${REGISTRY:-eshop}/webhooks.api:${PLATFORM:-linux}-${TAG:-latest}
    build:
      context: .
      dockerfile: Services/Webhooks/Webhooks.API/Dockerfile
    depends_on:
      sqldata:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:80
      - ConnectionStrings__WebhooksDb=Server=sqldata_${TJOB_NAME:-default},1433;Database=Microsoft.eShopOnContainers.Services.WebhooksDb;User Id=sa;Password=Pass@word;Encrypt=False;TrustServerCertificate=true
      - ConnectionStrings__EventBus=rabbitmq_${TJOB_NAME:-default}
      - EventBus__UserName=${ESHOP_SERVICE_BUS_USERNAME}
      - EventBus__Password=${ESHOP_SERVICE_BUS_PASSWORD}
      - Identity__Url=http://identity_api_${TJOB_NAME:-default}
      - Identity__ExternalUrl=http://identity_api_${TJOB_NAME:-default}
    networks:
      - jenkins_network

  mobileshoppingapigw:
    container_name: mobileshoppingapigw_${TJOB_NAME:-default}
    build:
      context: .
      dockerfile: ApiGateways/Envoy/config/mobileshopping/Dockerfile
    environment:
      - loglevel=debug
      - TAG=${TJOB_NAME:-default}
    networks:
      - jenkins_network

  mobileshoppingagg:
    container_name: mobileshoppingagg_${TJOB_NAME:-default}
    image: ${REGISTRY:-eshop}/mobileshoppingagg:${PLATFORM:-linux}-${TAG:-latest}
    build:
      context: .
      dockerfile: ApiGateways/Mobile.Bff.Shopping/aggregator/Dockerfile
    depends_on:
      nosqldata:
        condition:
          service_started
      sqldata:
        condition:
          service_healthy
      identity-api:
        condition:
          service_started
      rabbitmq:
        condition:
          service_started
      ordering-api:
        condition:
          service_healthy
      catalog-api:
        condition:
          service_started
      basket-api:
        condition:
          service_started
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:80
      - urls__basket=http://basket_api_${TJOB_NAME:-default}
      - urls__catalog=http://catalog_api_${TJOB_NAME:-default}
      - urls__orders=http://ordering_api_${TJOB_NAME:-default}
      - urls__identity=http://identity_api_${TJOB_NAME:-default}
      - urls__grpcBasket=http://basket_api_${TJOB_NAME:-default}:81
      - urls__grpcCatalog=http://catalog_api_${TJOB_NAME:-default}:81
      - urls__grpcOrdering=http://ordering_api_${TJOB_NAME:-default}:81
      - CatalogUrlHC=http://catalog_api_${TJOB_NAME:-default}/hc
      - OrderingUrlHC=http://ordering_api_${TJOB_NAME:-default}/hc
      - IdentityUrlHC=http://identity_api_${TJOB_NAME:-default}/hc
      - BasketUrlHC=http://basket_api_${TJOB_NAME:-default}/hc
      - PaymentUrlHC=http://payment_api_${TJOB_NAME:-default}/hc
      - Identity__Url=http://identity_api_${TJOB_NAME:-default}
      - Identity__ExternalUrl=http://identity_api_${TJOB_NAME:-default}
    networks:
      - jenkins_network

  webshoppingagg:
    container_name: webshoppingagg_${TJOB_NAME:-default}
    image: ${REGISTRY:-eshop}/webshoppingagg:${PLATFORM:-linux}-${TAG:-latest}
    build:
      context: .
      dockerfile: ApiGateways/Web.Bff.Shopping/aggregator/Dockerfile
    depends_on:
      nosqldata:
        condition:
          service_started
      sqldata:
        condition:
          service_healthy
      identity-api:
        condition:
          service_started
      rabbitmq:
        condition:
          service_started
      ordering-api:
        condition:
          service_healthy
      catalog-api:
        condition:
          service_started
      basket-api:
        condition:
          service_started
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:80
      - urls__basket=http://basket_api_${TJOB_NAME:-default}
      - urls__catalog=http://catalog_api_${TJOB_NAME:-default}
      - urls__orders=http://ordering_api_${TJOB_NAME:-default}
      - urls__identity=http://identity_api_${TJOB_NAME:-default}
      - urls__grpcBasket=http://basket_api_${TJOB_NAME:-default}:81
      - urls__grpcCatalog=http://catalog_api_${TJOB_NAME:-default}:81
      - urls__grpcOrdering=http://ordering_api_${TJOB_NAME:-default}:81
      - ReverseProxy__Clusters__basket__Destinations__destination0__Address=http://basket_api_${TJOB_NAME:-default}
      - ReverseProxy__Clusters__catalog__Destinations__destination0__Address=http://catalog_api_${TJOB_NAME:-default}
      - ReverseProxy__Clusters__orders__Destinations__destination0__Address=http://ordering_api_${TJOB_NAME:-default}
      - ReverseProxy__Clusters__signalr__Destinations__destination0__Address=http://ordering_signalrhub_${TJOB_NAME:-default}
      - CatalogUrlHC=http://catalog_api_${TJOB_NAME:-default}/hc
      - OrderingUrlHC=http://ordering_api_${TJOB_NAME:-default}/hc
      - IdentityUrlHC=http://identity_api_${TJOB_NAME:-default}/hc
      - BasketUrlHC=http://basket_api_${TJOB_NAME:-default}/hc
      - PaymentUrlHC=http://payment_api_${TJOB_NAME:-default}/hc
      - Identity__Url=http://identity_api_${TJOB_NAME:-default}
      - Identity__ExternalUrl=http://identity_api_${TJOB_NAME:-default}
    networks:
      - jenkins_network

  ordering-signalrhub:
    container_name: ordering_signalrhub_${TJOB_NAME:-default}
    image: ${REGISTRY:-eshop}/ordering.signalrhub:${PLATFORM:-linux}-${TAG:-latest}
    build:
      context: .
      dockerfile: Services/Ordering/Ordering.SignalrHub/Dockerfile
    depends_on:
      nosqldata:
        condition:
          service_started
      sqldata:
        condition:
          service_healthy
      identity-api:
        condition:
          service_started
      rabbitmq:
        condition:
          service_started
      ordering-api:
        condition:
          service_healthy
      catalog-api:
        condition:
          service_started
      basket-api:
        condition:
          service_started
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:80
      - ConnectionStrings__EventBus=rabbitmq_${TJOB_NAME:-default}
      - EventBus__UserName=${ESHOP_SERVICE_BUS_USERNAME}
      - EventBus__Password=${ESHOP_SERVICE_BUS_PASSWORD}
      - AzureServiceBusEnabled=False
      - ApplicationInsights__InstrumentationKey=${INSTRUMENTATION_KEY}
      - OrchestratorType=${ORCHESTRATOR_TYPE}
      - Identity__Url=http://identity_api_${TJOB_NAME:-default}
    networks:
      - jenkins_network

  webstatus:
    container_name: webstatus_${TJOB_NAME:-default}
    image: ${REGISTRY:-eshop}/webstatus:${PLATFORM:-linux}-${TAG:-latest}
    build:
      context: .
      dockerfile: Web/WebStatus/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:80
      - HealthChecksUI__HealthChecks__0__Name=WebMVC HTTP Check
      - HealthChecksUI__HealthChecks__0__Uri=http://webmvc_${TJOB_NAME:-default}/hc
      - HealthChecksUI__HealthChecks__1__Name=WebSPA HTTP Check
      - HealthChecksUI__HealthChecks__1__Uri=http://webspa_${TJOB_NAME:-default}/hc
      - HealthChecksUI__HealthChecks__2__Name=Web Shopping Aggregator GW HTTP Check
      - HealthChecksUI__HealthChecks__2__Uri=http://webshoppingagg_${TJOB_NAME:-default}/hc
      - HealthChecksUI__HealthChecks__3__Name=Mobile Shopping Aggregator HTTP Check
      - HealthChecksUI__HealthChecks__3__Uri=http://mobileshoppingagg_${TJOB_NAME:-default}/hc
      - HealthChecksUI__HealthChecks__4__Name=Ordering HTTP Check
      - HealthChecksUI__HealthChecks__4__Uri=http://ordering_api_${TJOB_NAME:-default}/hc
      - HealthChecksUI__HealthChecks__5__Name=Basket HTTP Check
      - HealthChecksUI__HealthChecks__5__Uri=http://basket_api_${TJOB_NAME:-default}/hc
      - HealthChecksUI__HealthChecks__6__Name=Catalog HTTP Check
      - HealthChecksUI__HealthChecks__6__Uri=http://catalog_api_${TJOB_NAME:-default}/hc
      - HealthChecksUI__HealthChecks__7__Name=Identity HTTP Check
      - HealthChecksUI__HealthChecks__7__Uri=http://identity_api_${TJOB_NAME:-default}/hc
      - HealthChecksUI__HealthChecks__8__Name=Payments HTTP Check
      - HealthChecksUI__HealthChecks__8__Uri=http://payment_api_${TJOB_NAME:-default}/hc
      - HealthChecksUI__HealthChecks__9__Name=Ordering SignalRHub HTTP Check
      - HealthChecksUI__HealthChecks__9__Uri=http://ordering_signalrhub_${TJOB_NAME:-default}/hc
      - HealthChecksUI__HealthChecks__10__Name=Ordering HTTP Background Check
      - HealthChecksUI__HealthChecks__10__Uri=http://ordering_backgroundtasks_${TJOB_NAME:-default}/hc
      - ApplicationInsights__InstrumentationKey=${INSTRUMENTATION_KEY}
      - OrchestratorType=${ORCHESTRATOR_TYPE}
    networks:
      - jenkins_network

  webspa:
    container_name: webspa_${TJOB_NAME:-default}
    image: ${REGISTRY:-eshop}/webspa:${PLATFORM:-linux}-${TAG:-latest}
    build:
      context: .
      dockerfile: Web/WebSPA/Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:16-bullseye}
    depends_on:
      - webshoppingagg
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://0.0.0.0:80
      - IdentityUrl=http://identity_api_${TJOB_NAME:-default}
      - PurchaseUrl=http://webshoppingagg_${TJOB_NAME:-default}
      - IdentityUrlHC=http://identity_api_${TJOB_NAME:-default}/hc
      - SignalrHubUrl=http://webshoppingagg_${TJOB_NAME:-default}
      - UseCustomizationData=True
      - ApplicationInsights__InstrumentationKey=${INSTRUMENTATION_KEY}
      - OrchestratorType=${ORCHESTRATOR_TYPE}
    networks:
      - jenkins_network

  webmvc:
    container_name: webmvc_${TJOB_NAME:-default}
    image: ${REGISTRY:-eshop}/webmvc:${PLATFORM:-linux}-${TAG:-latest}
    build:
      context: .
      dockerfile: Web/WebMVC/Dockerfile
    depends_on:
      - webshoppingagg
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:80
      - PurchaseUrl=http://webshoppingagg_${TJOB_NAME:-default}
      - IdentityUrl=http://identity_api_${TJOB_NAME:-default}
      - SignalrHubUrl=http://webshoppingagg_${TJOB_NAME:-default}
      - IdentityUrlHC=http://identity_api_${TJOB_NAME:-default}/hc
      - UseCustomizationData=True
      - ApplicationInsights__InstrumentationKey=${INSTRUMENTATION_KEY}
      - OrchestratorType=${ORCHESTRATOR_TYPE}
      - UseLoadTest=${USE_LOADTEST:-False}
    networks:
      - jenkins_network

  webhooks-client:
    container_name: webhooks_client_${TJOB_NAME:-default}
    image: ${REGISTRY:-eshop}/webhooks.client:${PLATFORM:-linux}-${TAG:-latest}
    build:
      context: .
      dockerfile: Web/WebhookClient/Dockerfile
    depends_on:
      - webhooks-api
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:80
      - Token=6168DB8D-DC58-4094-AF24-483278923590      # Webhooks are registered with this token (any value is valid) but the client won't check it
      - IdentityUrl=http://identity_api_${TJOB_NAME:-default}
      - CallBackUrl=http://webhooks_client_${TJOB_NAME:-default}
      - WebhooksUrl=http://webhooks_api_${TJOB_NAME:-default}
      - SelfUrl=http://webhooks_client_${TJOB_NAME:-default}/
    networks:
      - jenkins_network

  webshoppingapigw:
    container_name: webshoppingapigw_${TJOB_NAME:-default}
    build:
      context: .
      dockerfile: ApiGateways/Envoy/config/webshopping/Dockerfile
    environment:
      - loglevel=debug
      - TAG="${TJOB_NAME:-default}"
    networks:
      - jenkins_network

volumes:
  eshop-sqldata:
    name: eshop-sqldata_${TJOB_NAME:-default}
    external: false
  eshop-nosqldata:
    name: eshop-nosqldata_${TJOB_NAME:-default}
    external: false
  eshop-basketdata:
    name: eshop-basketdata_${TJOB_NAME:-default}
    external: false

networks:
  jenkins_network:
    external: true
