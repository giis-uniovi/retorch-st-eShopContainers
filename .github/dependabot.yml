version: 2
updates:
  - package-ecosystem: maven
    directory: "/"
    schedule:
      interval: weekly
      day: "friday"
      time: "00:40"
      timezone: "Europe/Madrid"
    assignees:
      - "ClaudiodelaRiva"
    rebase-strategy: "disabled"
    open-pull-requests-limit: 20

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: "friday"
      time: "00:40"
      timezone: "Europe/Madrid"
    assignees:
      - "ClaudiodelaRiva"
    rebase-strategy: "disabled"
    open-pull-requests-limit: 20
# SUT UPDATES
  - package-ecosystem: "nuget"
    directories:
      - "/sut/**/*"
    schedule:
      interval: weekly
      day: "friday"
      time: "00:40"
      timezone: "Europe/Madrid"
    assignees:
      - "ClaudiodelaRiva"
    rebase-strategy: "disabled"
    open-pull-requests-limit: 30
    groups:
      # AspNetCore/DependencyCollector/Kubernetes cross-depend on the core
      # Microsoft.ApplicationInsights package version range, so bumping one
      # without the others can produce an unresolvable NuGet graph (e.g.
      # Kubernetes 8.0.1 requires core [2.23.0, 3.0.0), but AspNetCore 3.1.2
      # requires core >=3.1.2). Update them together in a single PR.
      application-insights:
        patterns:
          - "Microsoft.ApplicationInsights*"
      # Microsoft.AspNetCore.*, Microsoft.EntityFrameworkCore.*, and Microsoft.Extensions.*
      # are released as a single .NET patch train. A partial update causes NU1109
      # (centrally-pinned transitive is lower than what a sibling package requires).
      # Keep them all in one PR so Directory.Packages.props stays consistent.
      dotnet-runtime:
        patterns:
          - "Microsoft.AspNetCore.*"
          - "Microsoft.EntityFrameworkCore.*"
          - "Microsoft.Extensions.*"
          - "Microsoft.IdentityModel.*"
          - "System.IdentityModel.*"
      # Duende.IdentityServer.* packages are all released together at the same
      # version. A partial update breaks Identity.API at startup.
      duende:
        patterns:
          - "Duende.*"
      # RabbitMQ.Client 7.x replaced IModel with IChannel; AspNetCore.HealthChecks.Rabbitmq
      # must stay >= 9.0 to use the new async API or the healthcheck throws
      # TypeLoadException at runtime (build passes, deploy fails).
      rabbitmq:
        patterns:
          - "RabbitMQ.Client"
          - "AspNetCore.HealthChecks.Rabbitmq"
      # Swashbuckle.AspNetCore and .Newtonsoft must stay on the same version.
      swashbuckle:
        patterns:
          - "Swashbuckle.AspNetCore*"
      # Grpc packages are released together as a single ecosystem.
      grpc:
        patterns:
          - "Grpc.*"
          - "Google.Protobuf"
      # AspNetCore.HealthChecks.* packages are released together (except
      # AzureStorage which tracks a different version line).
      healthchecks:
        patterns:
          - "AspNetCore.HealthChecks.*"
      # Azure SDK packages share a release cadence.
      azure:
        patterns:
          - "Azure.*"
      # xunit runner and test SDK must stay compatible with each other.
      testing:
        patterns:
          - "xunit*"
          - "Microsoft.NET.Test.Sdk"
    ignore:
      # Block ALL .NET major-version bumps (runtime, ASP.NET Core, EF Core, etc.)
      - dependency-name: "Microsoft.AspNetCore.*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "Microsoft.EntityFrameworkCore.*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "Microsoft.Extensions.*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "Microsoft.NET.*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "System.*"
        update-types: ["version-update:semver-major"]
      # Swashbuckle.AspNetCore 7.x+ depends on Microsoft.OpenApi 2.x, whose
      # OpenApiSecurityScheme/OpenApiReference/OpenApiResponse API breaks the
      # Swagger setup in Services.Common (AuthorizeCheckOperationFilter.cs,
      # CommonExtensions.cs). Stay on 6.x until that code is migrated.
      - dependency-name: "Swashbuckle.AspNetCore*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/sut/src/Web/WebSPA/Client"
    schedule:
      interval: weekly
      day: "friday"
      time: "00:40"
      timezone: "Europe/Madrid"
    assignees:
      - "ClaudiodelaRiva"
    rebase-strategy: "disabled"
    groups:
      # All Angular packages must move together: core packages require exact sibling
      # peer versions (e.g. @angular/animations@21.2.18 requires @angular/core@"21.2.18"),
      # so a partial update causes ERESOLVE during npm install.
      angular:
        patterns:
          - "@angular/*"
          - "@angular-devkit/*"
    ignore:
      # Angular 21 LTS fixed in order to avoid accidental updates to the major version
      - dependency-name: "@angular/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@angular-devkit/*"
        update-types: ["version-update:semver-major"]
      # @angular-devkit/build-angular 21.2.x requires typescript >=5.9 <6.0;
      # only allow patch bumps within that supported range
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
    open-pull-requests-limit: 20